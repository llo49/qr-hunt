<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR CODE HUNT ห้องสมุด</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle, #0f172a, #000);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        
        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.85);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
            position: relative;
            transition: all 0.3s ease;
        }
        
        h2 {
            color: #a78bfa;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }
        
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input {
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        button {
            background: #7c3aed;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
        }

        button:hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
        
        .choice-btn {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            text-align: left;
            padding: 15px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(167, 139, 250, 0.5);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .menu-btn {
            background: #1e293b;
            border: 1px solid #475569;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            padding: 20px;
            margin: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .menu-btn:hover {
            background: #2d3748;
            border-color: #a78bfa;
            color: #a78bfa;
        }
        
        .correct { 
            background: #22c55e !important; 
            font-weight: bold;
            box-shadow: 0 0 15px #22c55e;
            animation: pop 0.3s ease;
        }
        .wrong { 
            background: #ef4444 !important; 
            font-weight: bold;
            box-shadow: 0 0 15px #ef4444;
        }
        
        .shake {
            animation: shakeEffect 0.4s ease;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        #question-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .food-img-container {
            width: 100%;
            height: 250px;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .food-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            clip-path: circle(25% at 50% 50%);
        }

        .zoom-somtum { object-position: 50% 45%; transform: scale(1.6); }
        .zoom-bingsu { object-position: 50% 20%; transform: scale(1.7); }
        .zoom-padthai { object-position: 58% 38%; transform: scale(1.6); }
        .zoom-takoyaki { object-position: 50% 50%; transform: scale(1.5); }
        .zoom-ramen { object-position: 63% 28%; transform: scale(1.6); }

        #score-screen h3 {
            font-size: 35px;
            color: #facc15;
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.15s ease-out;
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            background-color: #f00;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div class="container" id="main-card">
    <!-- หน้าแรก: กรอกชื่อ -->
    <div id="name-screen">
        <h2>📚 QR CODE HUNT</h2>
        <p>กรุณากรอกชื่อของคุณเพื่อเข้าสู่ภารกิจ</p>
        <input type="text" id="playerName" placeholder="พิมพ์ชื่อของคุณที่นี่..." autocomplete="off">
        <button onclick="saveNameAndProceed()">ถัดไป</button>
    </div>

    <!-- หน้าเลือกหมวดหมู่ (จะถูกข้ามอัตโนมัติถ้าสแกนลิงก์แยกหมวดมา) -->
    <div id="menu-screen" style="display: none;">
        <h2>เลือกรหัสหมวดหมู่</h2>
        <p>คลิกเลือกหมวดที่คุณสแกนเจอ</p>
        <div class="menu-grid">
            <button class="menu-btn" onclick="selectMode('A')">หมวด A</button>
            <button class="menu-btn" onclick="selectMode('B')">หมวด B</button>
            <button class="menu-btn" onclick="selectMode('C')">หมวด C</button>
            <button class="menu-btn" onclick="selectMode('D')">หมวด D</button>
            <button class="menu-btn" onclick="selectMode('E')">หมวด E</button>
            <button class="menu-btn" onclick="selectMode('F')">หมวด F</button>
        </div>
    </div>

    <!-- หน้าเล่นเกม -->
    <div id="game-screen" style="display: none;">
        <div id="progress" style="text-align: right; color: #a78bfa; font-size: 14px; margin-bottom: 10px;">ข้อที่ 1/5</div>
        <div id="food-media-placeholder"></div>
        <div id="question-text">คำถามจะขึ้นตรงนี้</div>
        <div id="choices-box"></div>
    </div>

    <!-- หน้าสรุปคะแนน -->
    <div id="score-screen" style="display: none;">
        <h2>🎉 จบภารกิจ! 🎉</h2>
        <p id="thank-you-msg">เก่งมากคุณผู้เล่น</p>
        <p>คะแนนที่คุณได้</p>
        <h3 id="final-score">0 / 5</h3>
        <button onclick="handleRestart()">กลับไปหน้าแรก</button>
    </div>
</div>

<script>
const foodImages = {
    somtum: "somtum.jpg",
    bingsu: "bingsu.jpg",
    padthai: "padthai.jpg",
    takoyaki: "takoyaki.jpg",
    ramen: "ramen.jpg"
};

const allQuestionPools = {
    A: [
        { q: "คำราชาศัพท์ของคำว่า 'กิน' สำหรับพระมหากษัตริย์คืออะไร?", c: ["เสวย", "รับประทาน", "ฉัน", "ทาน"], a: 0 },
        { q: "คำราชาศัพท์ของคำว่า 'นอน' คืออะไร?", c: ["บรรทม", "จำวัด", "จำศีล", "พักผ่อน"], a: 0 },
        { q: "คำราชาศัพท์ของคำว่า 'ไหว้' คืออะไร?", c: ["ทรงกราบ", "นมัสการ", "ทรงประนมมือ", "ถวายบังคม"], a: 2 },
        { q: "คำว่า 'พระหัตถ์' หมายถึงอวัยวะส่วนใด?", c: ["มือ", "เท้า", "หัว", "ตา"], a: 0 },
        { q: "คำว่า 'พระเนตร' หมายถึงอวัยวะส่วนใด?", c: ["ตา", "หู", "จมูก", "ปาก"], a: 0 }
    ],
    B: [
        { q: "จากรูปภาพจริงที่เจาะส่องให้ดูนี้ มันคืออาหารไทยชนิดใด?", c: ["ส้มตำ", "ตำซั่ว", "ซุปหน่อไม้", "ยำมะม่วง"], a: 0, img: foodImages.somtum, zoomClass: "zoom-somtum" },
        { q: "ของหวานหวานเย็นสไตล์เกาหลีในภาพจริงนี้เรียกว่าอะไร?", c: ["น้ำแข็งใสถั่วแดง", "ไอศกรีมซันเด", "บิงซูสตรอเบอร์รี่", "ฮันนี่โทสต์"], a: 2, img: foodImages.bingsu, zoomClass: "zoom-bingsu" },
        { q: "เมนูเส้นระดับ Global ของไทยในภาพจานนี้คืออะไร?", c: ["ผัดซีอิ๊ว", "ก๋วยเตี๋ยวคั่วไก่", "ผัดไทยกุ้งสด", "เส้นหมี่ผัดกระเฉด"], a: 2, img: foodImages.padthai, zoomClass: "zoom-padthai" },
        { q: "สตรีทฟู้ดญี่ปุ่นทรงกลมราดซอสฉ่ำๆ ในจานนี้คืออะไร?", c: ["โอโคโนมิยากิ", "ทาโกยากิ", "ขนมครกญี่ปุ่น", "ยากิโทริ"], a: 1, img: foodImages.takoyaki, zoomClass: "zoom-takoyaki" },
        { q: "เมนูน้ำซุปร้อนๆ ที่กำลังใช้ตะเกียบคีบเส้นขึ้นมานี้คืออะไร?", c: ["อุด้งน้ำ", "เย็นตาโฟ", "ราเมง", "ก๋วยเตี๋ยวน้ำใส"], a: 2, img: foodImages.ramen, zoomClass: "zoom-ramen" }
    ],
    C: [
        { q: "ข้อใดจัดว่าเป็น 'คำกริยา' ทั้งหมด?", c: ["วิ่ง, กระโดด, นอน", "โรงเรียน, แมว, โต๊ะ", "สวย, รวดเร็ว, สูง", "ฉัน, เธอ, มัน"], a: 0 },
        { q: "ในประโยค 'น้องร้องเพลงเสียงดัง' คำใดคือคำกริยา?", c: ["น้อง", "ร้องเพลง", "เสียง", "ดัง"], a: 1 },
        { q: "คำกริยาในข้อใดแสดงอาการเคลื่อนที่?", c: ["นั่ง", "นอน", "เดิน", "คิด"], a: 2 },
        { q: "ข้อใดไม่ใช่คำกริยา?", c: ["หัวเราะ", "ดินสอ", "ว่ายน้ำ", "บิน"], a: 1 },
        { q: "คำกริยาคำใดหมายถึงการทำความสะอาด?", c: ["กวาด", "กิน", "เรียน", "คุย"], a: 0 }
    ],
    D: [
        { q: "1. พี่เปเป้มีนามสกุลอย่างไร", c: ["โชติผนัส", "โชคติพนัส", "โชติพนัส", "โชคพนัส"], a: 2 },
        { q: "2. พี่มีมี่เป็นดีเจชื่อว่าอะไร", c: ["ดีเจปลากระป๋อง", "ดีเจปลาทูน่า", "ดีเจเมวี่", "ไม่รู้"], a: 0 },
        { q: "3. นามสกุลของพี่มีมี่คืออะไร", c: ["บัวทวน", "บัวบาน", "บัวอวน", "บัวฮวน"], a: 0 },
        { q: "4. ชื่อจริงของพี่ใบตองคืออะไร", c:
